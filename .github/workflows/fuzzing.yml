name: Fuzzing

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jazzer:
    name: Jazzer fuzz targets
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Harden the runner (Block unexpected outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.adoptium.net:443
            api.github.com:443
            github.com:443
            github-releases.githubusercontent.com:443
            objects.githubusercontent.com:443
            repo.maven.apache.org:443
            repo1.maven.org:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile test classes
        run: mvn -DskipTests test-compile

      - name: Download Jazzer CLI
        run: |
          curl -fsSL -o jazzer_linux.tar.gz \
            https://github.com/CodeIntelligenceTesting/jazzer/releases/download/v0.22.1/jazzer-linux.tar.gz
          tar -xzf jazzer_linux.tar.gz jazzer
          chmod +x jazzer

      - name: Fuzz AsyncTestConfig builder
        run: |
          ./jazzer \
            --target_class=com.github.asynctest.fuzz.AsyncTestConfigFuzzTarget \
            --cp=target/test-classes:target/classes \
            -max_total_time=120 \
            -print_final_stats=1 \
            -artifact_prefix=fuzzing-findings/
        continue-on-error: true  # findings are artifacts, not hard failures in CI

      - name: Upload fuzzing findings
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: jazzer-findings
          path: fuzzing-findings/
          if-no-files-found: ignore
          retention-days: 30
