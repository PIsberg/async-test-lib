name: Tests & Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: [ '21' ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Prepare local Maven repository
        run: mkdir -p .m2/repository
      
      - name: Run library tests and install artifact
        run: mvn -Dmaven.repo.local=.m2/repository clean install

      - name: Run consumer fixture tests
        run: mvn -Dmaven.repo.local=.m2/repository -f consumer-fixture/pom.xml test
      
      - name: Generate coverage report
        run: mvn -Dmaven.repo.local=.m2/repository jacoco:report
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build:
    name: Build Maven Project
    runs-on: ubuntu-latest
    needs: test
    
    strategy:
      matrix:
        java-version: [ '21' ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven
      
      - name: Compile and build
        run: mvn clean package -DskipTests
      
      - name: Display build output
        run: ls -lah target/
      
      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: async-test-library-java-${{ matrix.java-version }}
          path: target/async-test-*.jar
          retention-days: 30
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-java-${{ matrix.java-version }}
          path: target/surefire-reports/
          retention-days: 7

  publish-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: [ test, build ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    strategy:
      matrix:
        java-version: [ '21' ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven
      
      - name: Generate Javadoc
        run: mvn -DskipTests javadoc:javadoc
      
      - name: Display documentation output
        run: ls -lah target/reports/apidocs/
      
      - name: Upload Javadoc artifacts
        uses: actions/upload-artifact@v4
        with:
          name: javadoc-java-${{ matrix.java-version }}
          path: target/reports/apidocs/
          retention-days: 30

