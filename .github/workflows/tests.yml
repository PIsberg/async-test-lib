name: Tests & Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java-version: [ '21', '25' ]

    steps:
      - name: Harden the runner (Block unexpected outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.adoptium.net:443
            api.github.com:443
            cli.codecov.io:443
            codecov.io:443
            github.com:443
            ingest.codecov.io:443
            keys.openpgp.org:443
            keyserver.ubuntu.com:443
            objects.githubusercontent.com:443
            repo.maven.apache.org:443
            repo1.maven.org:443
            storage.googleapis.com:443
            uploader.codecov.io:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Prepare local Maven repository
        run: mkdir -p .m2/repository
      
      - name: Run library tests and install artifact
        run: mvn -Dmaven.repo.local=.m2/repository clean install

      - name: Run consumer fixture tests
        run: mvn -Dmaven.repo.local=.m2/repository -f consumer-fixture/pom.xml test

      - name: Run all example tests
        run: |
          for dir in examples/*/; do
            if [ -f "$dir/pom.xml" ]; then
              echo "Running tests in $dir"
              mvn -Dmaven.repo.local=.m2/repository -f "$dir/pom.xml" test
            fi
          done

      - name: Check coverage file exists
        run: |
          if [ -f ./target/site/jacoco/jacoco.xml ]; then
            echo "✓ Coverage file found"
            wc -c ./target/site/jacoco/jacoco.xml
          else
            echo "✗ Coverage file NOT found at ./target/site/jacoco/jacoco.xml"
            echo "Checking target directory structure:"
            ls -la ./target/ || echo "target/ directory not found"
            ls -la ./target/site/ || echo "target/site/ directory not found"
            ls -la ./target/site/jacoco/ || echo "target/site/jacoco/ directory not found"
            exit 1
          fi

      - name: Import Codecov GPG key
        run: |
          gpg --keyserver hkps://keys.openpgp.org --recv-keys 27034E7FDB850E0BBC2C62FF806BB28AED779869 || \
          gpg --keyserver hkps://keyserver.ubuntu.com --recv-keys 27034E7FDB850E0BBC2C62FF806BB28AED779869 || \
          echo "WARNING: Could not import GPG key, proceeding without verification"

      - name: Upload coverage to Codecov
        if: matrix.java-version == '21'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build Maven Project
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        java-version: [ '21', '25' ]

    steps:
      - name: Harden the runner (Block unexpected outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.adoptium.net:443
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            repo.maven.apache.org:443
            repo1.maven.org:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Compile and build
        run: mvn clean package -DskipTests
      
      - name: Display build output
        run: ls -lah target/
      
      - name: Upload JAR artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: async-test-library-java-${{ matrix.java-version }}
          path: target/async-test-*.jar
          retention-days: 30
      
      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-reports-java-${{ matrix.java-version }}
          path: target/surefire-reports/
          retention-days: 7

  publish-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: [ test, build ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        java-version: [ '21' ]

    steps:
      - name: Harden the runner (Block unexpected outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.adoptium.net:443
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            repo.maven.apache.org:443
            repo1.maven.org:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Generate Javadoc
        run: mvn -DskipTests javadoc:javadoc
      
      - name: Display documentation output
        run: ls -lah target/reports/apidocs/
      
      - name: Upload Javadoc artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: javadoc-java-${{ matrix.java-version }}
          path: target/reports/apidocs/
          retention-days: 30

