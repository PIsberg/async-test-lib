name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write
      id-token: write  # required for keyless cosign signing via OIDC
    
    steps:
      - name: Harden the runner (Block unexpected outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.adoptium.net:443
            api.github.com:443
            fulcio.sigstore.dev:443
            github.com:443
            maven.pkg.github.com:443
            objects.githubusercontent.com:443
            rekor.sigstore.dev:443
            repo1.maven.org:443
            tuf-repo-cdn.sigstore.dev:443
            uploads.github.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      
      - name: Build and test
        run: mvn clean verify
      
      - name: Publish to GitHub Packages
        run: mvn deploy
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign release artifacts with cosign (keyless / OIDC)
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          for artifact in \
            target/async-test-${VERSION}.jar \
            target/async-test-${VERSION}-sources.jar \
            target/async-test-${VERSION}-javadoc.jar \
            target/bom.xml; do
            cosign sign-blob --yes \
              --bundle "${artifact}.bundle" \
              "${artifact}"
          done

      - name: Create GitHub Release with artifacts and signatures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          gh release create "${{ github.ref_name }}" \
            target/async-test-${VERSION}.jar \
            target/async-test-${VERSION}.jar.bundle \
            target/async-test-${VERSION}-sources.jar \
            target/async-test-${VERSION}-sources.jar.bundle \
            target/async-test-${VERSION}-javadoc.jar \
            target/async-test-${VERSION}-javadoc.jar.bundle \
            target/bom.xml \
            target/bom.xml.bundle \
            --title "Release ${{ github.ref_name }}" \
            --notes "## Async Test Library Release ${{ github.ref_name }}

          ### What's included:
          - \`async-test-${VERSION}.jar\` — Main library (+ \`.bundle\` cosign signature)
          - \`async-test-${VERSION}-sources.jar\` — Source code (+ \`.bundle\` cosign signature)
          - \`async-test-${VERSION}-javadoc.jar\` — API Documentation (+ \`.bundle\` cosign signature)
          - \`bom.xml\` — CycloneDX SBOM (+ \`.bundle\` cosign signature)

          ### Verify a signature
          \`\`\`bash
          cosign verify-blob --bundle async-test-${VERSION}.jar.bundle \
            --certificate-identity-regexp 'https://github.com/PIsberg/async-test-lib' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            async-test-${VERSION}.jar
          \`\`\`

          ### Installation via Maven:
          \`\`\`xml
          <dependency>
            <groupId>com.github.asynctest</groupId>
            <artifactId>async-test</artifactId>
            <version>${VERSION}</version>
            <scope>test</scope>
          </dependency>
          \`\`\`

          For GitHub Packages, add to your \`pom.xml\`:
          \`\`\`xml
          <repository>
            <id>github</id>
            <name>GitHub Packages</name>
            <url>https://maven.pkg.github.com/PIsberg/async-test-lib</url>
          </repository>
          \`\`\`

          See documentation at: https://github.com/PIsberg/async-test-lib"
