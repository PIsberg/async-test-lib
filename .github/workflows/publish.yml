name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Harden the runner (Block unexpected outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.adoptium.net:443
            api.github.com:443
            fulcio.sigstore.dev:443
            github.com:443
            maven.pkg.github.com:443
            objects.githubusercontent.com:443
            rekor.sigstore.dev:443
            repo1.maven.org:443
            tuf-repo-cdn.sigstore.dev:443
            uploads.github.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      
      - name: Build and test
        run: mvn clean verify
      
      - name: Publish to GitHub Packages
        run: mvn deploy
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: target/bom.xml
          asset_name: bom.xml
          asset_content_type: application/xml

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          gh release create "${{ github.ref_name }}" \
            target/async-test-${VERSION}.jar \
            target/async-test-${VERSION}-sources.jar \
            target/async-test-${VERSION}-javadoc.jar \
            --title "Release ${{ github.ref_name }}" \
            --notes "## Async Test Library Release ${{ github.ref_name }}

          ### What's included:
          - \`async-test-${VERSION}.jar\` - Main library
          - \`async-test-${VERSION}-sources.jar\` - Source code
          - \`async-test-${VERSION}-javadoc.jar\` - API Documentation

          ### Installation via Maven:
          \`\`\`xml
          <dependency>
            <groupId>com.github.asynctest</groupId>
            <artifactId>async-test</artifactId>
            <version>${VERSION}</version>
            <scope>test</scope>
          </dependency>
          \`\`\`

          For GitHub Packages, add to your \`pom.xml\`:
          \`\`\`xml
          <repository>
            <id>github</id>
            <name>GitHub Packages</name>
            <url>https://maven.pkg.github.com/PIsberg/async-test-lib</url>
          </repository>
          \`\`\`

          See documentation at: https://github.com/PIsberg/async-test-lib"
