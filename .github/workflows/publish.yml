name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      
      - name: Build and test
        run: mvn clean verify
      
      - name: Publish to GitHub Packages
        run: mvn deploy
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          gh release create "${{ github.ref_name }}" \
            target/async-test-${VERSION}.jar \
            target/async-test-${VERSION}-sources.jar \
            target/async-test-${VERSION}-javadoc.jar \
            --title "Release ${{ github.ref_name }}" \
            --notes "## Async Test Library Release ${{ github.ref_name }}

          ### What's included:
          - \`async-test-${VERSION}.jar\` - Main library
          - \`async-test-${VERSION}-sources.jar\` - Source code
          - \`async-test-${VERSION}-javadoc.jar\` - API Documentation

          ### Installation via Maven:
          \`\`\`xml
          <dependency>
            <groupId>com.github.asynctest</groupId>
            <artifactId>async-test</artifactId>
            <version>${VERSION}</version>
            <scope>test</scope>
          </dependency>
          \`\`\`

          For GitHub Packages, add to your \`pom.xml\`:
          \`\`\`xml
          <repository>
            <id>github</id>
            <name>GitHub Packages</name>
            <url>https://maven.pkg.github.com/PIsberg/async-test-lib</url>
          </repository>
          \`\`\`

          See documentation at: https://github.com/PIsberg/async-test-lib"
