name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build and test
        run: mvn clean verify
      
      - name: Publish to GitHub Packages
        run: mvn deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Async Test Library Release ${{ github.ref_name }}
            
            ### What's included:
            - async-test-${{ github.ref_name }}.jar - Main library
            - async-test-${{ github.ref_name }}-sources.jar - Source code
            - async-test-${{ github.ref_name }}-javadoc.jar - API Documentation
            
            ### Installation via Maven:
            ```xml
            <dependency>
              <groupId>com.github.asynctest</groupId>
              <artifactId>async-test</artifactId>
              <version>${{ github.ref_name }}</version>
              <scope>test</scope>
            </dependency>
            ```
            
            For GitHub Packages, add to your `pom.xml`:
            ```xml
            <repository>
              <id>github</id>
              <name>GitHub Packages</name>
              <url>https://maven.pkg.github.com/yourusername/async-test-lib</url>
            </repository>
            ```
            
            See documentation at: https://github.com/yourusername/async-test-lib
          draft: false
          prerelease: false
